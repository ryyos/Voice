version: "3.9"

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
      POSTGRES_DB: voice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redpanda:
    image: redpandadata/redpanda:v23.3.11
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  # ── App services ──────────────────────────────────────────────────────────

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    depends_on:
      - redpanda
    restart: on-failure

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
    restart: on-failure

  worker:
    build: .
    command: python -m worker.main
    env_file: .env
    depends_on:
      - redpanda
      - mongo
    restart: on-failure

  processor:
    build: .
    command: python -m processor.main
    env_file: .env
    depends_on:
      - mongo
      - postgres
    restart: on-failure

volumes:
  mongo_data:
  postgres_data:
