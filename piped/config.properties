PORT: 8080
HTTP_WORKERS: 2

# Proxy URL — diisi seadanya karena kita hanya pakai API metadata/comments,
# bukan stream video bytes. Piped tetap butuh nilai ini untuk construct URL.
PROXY_PART: http://localhost:8888

# PostgreSQL — numpang di voice-postgres, database terpisah
hibernate.connection.url: jdbc:postgresql://postgres:5432/piped
hibernate.connection.driver_class: org.postgresql.Driver
hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
hibernate.connection.username: voice
hibernate.connection.password: voice

# Matikan registrasi — kita cuma pakai sebagai data API, bukan user platform
DISABLE_REGISTRATION: true

# Simpan feed 30 hari
FEED_RETENTION: 30
